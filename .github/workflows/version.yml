name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version
        run: |
          BUILD="build.${{ github.run_number }}"
          printf '{"version":"%s"}\n' "$BUILD" > version.json
          sed -i "s|const CACHE = '.*'|const CACHE = 'caseclock-$BUILD'|" sw.js

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
