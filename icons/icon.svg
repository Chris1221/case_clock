<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#22487a"/>
      <stop offset="100%" stop-color="#0e2036"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Stopwatch crown (stem) -->
  <rect x="236" y="54" width="40" height="50" rx="14" fill="rgba(255,255,255,0.55)"/>
  <!-- Crown button on top -->
  <rect x="220" y="42" width="72" height="28" rx="14" fill="rgba(255,255,255,0.4)"/>

  <!-- Clock face outer ring -->
  <circle cx="256" cy="308" r="178" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="8"/>

  <!-- Tier zone fill: tier 2 (60–90 min) — medium ring -->
  <circle cx="256" cy="308" r="152" fill="none" stroke="rgba(0,180,180,0.12)" stroke-width="36"/>

  <!-- Tier zone fill: tier 3 (90+ min) — outer ring -->
  <circle cx="256" cy="308" r="170" fill="none" stroke="rgba(0,180,180,0.07)" stroke-width="16"/>

  <!-- 15-minute billing tick marks (12 of them, every 30°) -->
  <!-- Major ticks at 0, 90, 180, 270° (billing unit boundaries) -->
  <g stroke="rgba(0,180,180,0.9)" stroke-width="6" stroke-linecap="round">
    <!-- 15 min / 3 o'clock -->
    <line x1="432" y1="308" x2="418" y2="308"/>
    <!-- 30 min / 6 o'clock -->
    <line x1="256" y1="484" x2="256" y2="470"/>
    <!-- 45 min / 9 o'clock -->
    <line x1="80" y1="308" x2="94" y2="308"/>
  </g>

  <!-- Minor ticks at all other 30° intervals -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round">
    <!-- 5 min -->
    <line x1="345" y1="143" x2="338" y2="155"/>
    <!-- 10 min -->
    <line x1="421" y1="219" x2="411" y2="227"/>
    <!-- 20 min -->
    <line x1="421" y1="397" x2="411" y2="389"/>
    <!-- 25 min -->
    <line x1="345" y1="473" x2="338" y2="461"/>
    <!-- 35 min -->
    <line x1="167" y1="473" x2="174" y2="461"/>
    <!-- 40 min -->
    <line x1="91" y1="397" x2="101" y2="389"/>
    <!-- 50 min -->
    <line x1="91" y1="219" x2="101" y2="227"/>
    <!-- 55 min -->
    <line x1="167" y1="143" x2="174" y2="155"/>
  </g>

  <!-- 12 o'clock top tick (0 / 60 min mark) — bright -->
  <line x1="256" y1="132" x2="256" y2="148" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Clock hands -->
  <!-- Hour hand (short, pointing roughly to 10 o'clock position = start) -->
  <line x1="256" y1="308" x2="196" y2="210"
    stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Minute hand (long, pointing to ~2 o'clock = 45% through) -->
  <line x1="256" y1="308" x2="350" y2="205"
    stroke="#00b4b4" stroke-width="10" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="308" r="14" fill="white"/>
  <circle cx="256" cy="308" r="7" fill="#00b4b4"/>

  <!-- "$" billing symbol — bottom right, small badge -->
  <circle cx="390" cy="442" r="46" fill="#00b4b4"/>
  <text x="390" y="458" text-anchor="middle"
    font-family="Georgia, serif" font-size="54" font-weight="700"
    fill="#0e2036">$</text>
</svg>
